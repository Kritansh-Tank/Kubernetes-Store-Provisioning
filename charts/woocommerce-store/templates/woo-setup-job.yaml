# Job: WP-CLI based WooCommerce auto-setup
# Runs after WordPress is up: installs WooCommerce, activates Storefront theme,
# configures COD payment, and seeds sample products for end-to-end order testing.
#
# Strategy: The WordPress container (apache image) auto-creates wp-config.php and
# installs WP core files under /var/www/html. This Job uses the WP-CLI image to
# download a fresh copy of WP core, create wp-config.php pointing at the same DB,
# and run wp-cli commands against it. The wp-content PVC is shared so plugins/themes
# installed here are visible to the running WordPress pod.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.storeName }}-woo-setup
  labels:
    app: {{ .Values.storeName }}-woo-setup
    store-id: {{ .Values.storeId }}
  annotations:
    helm.sh/hook: post-install
    helm.sh/hook-weight: "10"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: {{ .Values.storeName }}-woo-setup
        store-id: {{ .Values.storeId }}
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-wordpress
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for WordPress to respond..."
              for i in $(seq 1 90); do
                if wget -q --spider http://{{ .Values.storeName }}-wordpress/wp-login.php 2>/dev/null; then
                  echo "WordPress is ready"
                  exit 0
                fi
                echo "Attempt $i/90 - waiting..."
                sleep 10
              done
              echo "WordPress did not become ready"
              exit 1
      containers:
        - name: woo-setup
          image: {{ .Values.woocommerce.cliImage }}
          securityContext:
            runAsUser: 0
          env:
            - name: WORDPRESS_DB_HOST
              value: {{ .Values.storeName }}-mariadb
            - name: WORDPRESS_DB_USER
              value: {{ .Values.mariadb.user | quote }}
            - name: WORDPRESS_DB_PASSWORD
              value: {{ .Values.mariadb.password | quote }}
            - name: WORDPRESS_DB_NAME
              value: {{ .Values.mariadb.database | quote }}
            - name: WP_CLI_ALLOW_ROOT
              value: "1"
          command:
            - sh
            - -c
            - |
              set -e

              WP_URL="http://{{ .Values.domain }}"
              WP_PATH="/var/www/html"
              DB_HOST="{{ .Values.storeName }}-mariadb"
              DB_USER="{{ .Values.mariadb.user }}"
              DB_PASS="{{ .Values.mariadb.password }}"
              DB_NAME="{{ .Values.mariadb.database }}"

              echo "=== WooCommerce Auto-Setup ==="
              echo "Store: {{ .Values.storeName }}"
              echo "Domain: {{ .Values.domain }}"

              # Step 1: Download WordPress core files if not present
              # (WP-CLI image only has the CLI binary, not WP core)
              if [ ! -f "$WP_PATH/wp-load.php" ]; then
                echo "Downloading WordPress core files..."
                wp core download --path="$WP_PATH" --skip-content --force
              else
                echo "WordPress core files already exist"
              fi

              # Step 2: Create wp-config.php pointing at the shared MariaDB
              if [ ! -f "$WP_PATH/wp-config.php" ]; then
                echo "Creating wp-config.php..."
                wp config create \
                  --dbhost="$DB_HOST" \
                  --dbname="$DB_NAME" \
                  --dbuser="$DB_USER" \
                  --dbpass="$DB_PASS" \
                  --path="$WP_PATH" \
                  --skip-check
              fi

              # Step 3: Wait for DB connectivity
              echo "Checking database..."
              for i in $(seq 1 30); do
                if wp db check --path="$WP_PATH" 2>/dev/null; then
                  echo "Database OK"
                  break
                fi
                echo "Waiting for database (attempt $i/30)..."
                sleep 5
              done

              # Step 4: Install WordPress core if not already installed
              if ! wp core is-installed --path="$WP_PATH" 2>/dev/null; then
                echo "Installing WordPress core..."
                wp core install \
                  --url="$WP_URL" \
                  --title="{{ .Values.storeName }} Store" \
                  --admin_user="{{ .Values.wordpress.adminUser }}" \
                  --admin_password="{{ .Values.wordpress.adminPassword }}" \
                  --admin_email="{{ .Values.wordpress.adminEmail }}" \
                  --skip-email \
                  --path="$WP_PATH"
              else
                echo "WordPress already installed, updating URL..."
                wp option update siteurl "$WP_URL" --path="$WP_PATH" || true
                wp option update home "$WP_URL" --path="$WP_PATH" || true
              fi

              echo "Setting permalink structure..."
              wp rewrite structure '/%postname%/' --path="$WP_PATH" || true

              # Step 5: Install and activate WooCommerce
              echo "Installing WooCommerce..."
              if ! wp plugin is-installed woocommerce --path="$WP_PATH" 2>/dev/null; then
                wp plugin install woocommerce --version=9.5.2 --activate --path="$WP_PATH"
              else
                wp plugin activate woocommerce --path="$WP_PATH" || true
              fi

              # Step 6: Install and activate Storefront theme
              echo "Installing Storefront theme..."
              if ! wp theme is-installed storefront --path="$WP_PATH" 2>/dev/null; then
                wp theme install storefront --activate --path="$WP_PATH"
              else
                wp theme activate storefront --path="$WP_PATH" || true
              fi

              # Step 7: Configure WooCommerce settings
              echo "Configuring WooCommerce..."
              wp option update woocommerce_store_address "123 Test Street" --path="$WP_PATH"
              wp option update woocommerce_store_city "Test City" --path="$WP_PATH"
              wp option update woocommerce_default_country "US:CA" --path="$WP_PATH"
              wp option update woocommerce_store_postcode "90210" --path="$WP_PATH"
              wp option update woocommerce_currency "USD" --path="$WP_PATH"
              wp option update woocommerce_calc_taxes "no" --path="$WP_PATH"
              wp option update woocommerce_onboarding_profile '{"completed":true}' --format=json --path="$WP_PATH" || true

              # Step 8: Enable Cash on Delivery payment gateway
              echo "Enabling COD payment gateway..."
              wp option update woocommerce_cod_settings '{"enabled":"yes","title":"Cash on Delivery","description":"Pay with cash upon delivery.","instructions":"Pay with cash upon delivery.","enable_for_methods":"","enable_for_virtual":"yes"}' --format=json --path="$WP_PATH"

              # Step 9: Create WooCommerce pages (shop, cart, checkout, my-account)
              echo "Creating WooCommerce pages..."
              wp wc --user=admin tool run install_pages --path="$WP_PATH" 2>/dev/null || true

              {{- if .Values.woocommerce.seedProducts }}
              # Step 10: Seed sample products for end-to-end testing
              echo "Seeding sample products..."

              wp wc product create \
                --user=admin \
                --name="Test T-Shirt" \
                --type=simple \
                --regular_price="19.99" \
                --description="A comfortable test t-shirt for order testing." \
                --short_description="Test t-shirt" \
                --manage_stock=true \
                --stock_quantity=100 \
                --status=publish \
                --catalog_visibility=visible \
                --path="$WP_PATH" || echo "Product 1 may already exist"

              wp wc product create \
                --user=admin \
                --name="Test Mug" \
                --type=simple \
                --regular_price="9.99" \
                --description="A test mug for order testing." \
                --short_description="Test mug" \
                --manage_stock=true \
                --stock_quantity=50 \
                --status=publish \
                --catalog_visibility=visible \
                --path="$WP_PATH" || echo "Product 2 may already exist"

              wp wc product create \
                --user=admin \
                --name="Test Hoodie" \
                --type=simple \
                --regular_price="39.99" \
                --description="A warm test hoodie for order testing." \
                --short_description="Test hoodie" \
                --manage_stock=true \
                --stock_quantity=25 \
                --status=publish \
                --catalog_visibility=visible \
                --path="$WP_PATH" || echo "Product 3 may already exist"

              echo "Sample products created."
              {{- end }}

              # Flush rewrite rules
              wp rewrite flush --path="$WP_PATH" || true

              # Fix ownership so the WordPress container (www-data, UID 33) can write
              echo "Fixing wp-content permissions..."
              chown -R 33:33 /var/www/html/wp-content

              echo "=== WooCommerce Setup Complete ==="
              echo "Store URL: $WP_URL"
              echo "Admin URL: $WP_URL/wp-admin"
              echo "Admin User: {{ .Values.wordpress.adminUser }}"
          volumeMounts:
            - name: wp-content
              mountPath: /var/www/html/wp-content
      volumes:
        - name: wp-content
          persistentVolumeClaim:
            claimName: {{ .Values.storeName }}-wp-content
