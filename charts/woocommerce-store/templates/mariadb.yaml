apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.storeName }}-mariadb
  labels:
    app: {{ .Values.storeName }}-mariadb
    store-id: {{ .Values.storeId }}
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: {{ .Values.mariadb.rootPassword | quote }}
  MYSQL_USER: {{ .Values.mariadb.user | quote }}
  MYSQL_PASSWORD: {{ .Values.mariadb.password | quote }}
  MYSQL_DATABASE: {{ .Values.mariadb.database | quote }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.storeName }}-mariadb-data
  labels:
    app: {{ .Values.storeName }}-mariadb
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: {{ .Values.mariadb.storage }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.storeName }}-mariadb
  labels:
    app: {{ .Values.storeName }}-mariadb
    store-id: {{ .Values.storeId }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ .Values.storeName }}-mariadb
  template:
    metadata:
      labels:
        app: {{ .Values.storeName }}-mariadb
        store-id: {{ .Values.storeId }}
    spec:
      securityContext:
        fsGroup: 999
      containers:
        - name: mariadb
          image: {{ .Values.mariadb.image }}
          ports:
            - containerPort: 3306
          envFrom:
            - secretRef:
                name: {{ .Values.storeName }}-mariadb
          resources:
            requests:
              cpu: {{ .Values.mariadb.resources.requests.cpu }}
              memory: {{ .Values.mariadb.resources.requests.memory }}
            limits:
              cpu: {{ .Values.mariadb.resources.limits.cpu }}
              memory: {{ .Values.mariadb.resources.limits.memory }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
          readinessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "127.0.0.1"]
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "127.0.0.1"]
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Values.storeName }}-mariadb-data
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.storeName }}-mariadb
  labels:
    app: {{ .Values.storeName }}-mariadb
spec:
  selector:
    app: {{ .Values.storeName }}-mariadb
  ports:
    - port: 3306
      targetPort: 3306
